<!DOCTYPE html>
<html>
<head>

<title>Field Buddy</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f4f4;
transition:0.3s;
}

body.dark{
background:#1e1e1e;
color:white;
}

.timer{
font-size:48px;
font-weight:bold;
}

.menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:white;
padding:20px;
transition:0.3s;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
}

body.dark .menu{
background:#2b2b2b;
}

.menuBtn{
position:fixed;
top:10px;
left:10px;
font-size:26px;
background:none;
border:none;
}

.popup{
display:none;
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
width:320px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

body.dark .popup{
background:#2b2b2b;
}

</style>

</head>

<body>

<button class="menuBtn" onclick="toggleMenu()">☰</button>

<div id="menu" class="menu">

<h4>Field Buddy</h4>

<button class="btn btn-primary w-100 mb-2" onclick="showManual()">Add Time</button>

<button class="btn btn-secondary w-100 mb-2" onclick="openTimes()">View Times</button>

<button class="btn btn-dark w-100" onclick="openSettings()">Settings</button>

</div>

<div class="container text-center mt-5">

<h1>Field Buddy</h1>

<div id="time" class="timer">0 sec</div>

<button class="btn btn-success me-2" onclick="startTimer()">Start</button>
<button class="btn btn-primary" onclick="saveTimer()">Save</button>

</div>

<!-- ADD TIME -->

<div id="manualBox" class="popup">

<h4>Add Time</h4>

<input id="hours" class="form-control mb-2" placeholder="Hours">
<input id="minutes" class="form-control mb-2" placeholder="Minutes">

<button class="btn btn-success w-100 mb-2" onclick="saveManual()">Save</button>

<button class="btn btn-secondary w-100" onclick="closeManual()">Close</button>

</div>

<!-- VIEW TIMES -->

<div id="timesBox" class="popup">

<h4>Saved Times</h4>

<div id="timesList"></div>

<button class="btn btn-secondary w-100 mt-3" onclick="closeTimes()">Close</button>

</div>

<!-- SETTINGS -->

<div id="settingsBox" class="popup">

<h4>Settings</h4>

<button class="btn btn-light w-100 mb-2" onclick="setLight()">Light Theme</button>

<button class="btn btn-dark w-100 mb-2" onclick="setDark()">Dark Theme</button>

<button class="btn btn-secondary w-100" onclick="closeSettings()">Close</button>

</div>

<script>

/* MENU */

function toggleMenu(){

let menu=document.getElementById("menu")

menu.style.left = menu.style.left==="0px" ? "-250px" : "0px"

}

/* TIMER */

let startTime
let timerInterval
let running=false

function startTimer(){

if(running) return

running=true

startTime=Date.now()

timerInterval=setInterval(function(){

let sec=Math.floor((Date.now()-startTime)/1000)

document.getElementById("time").innerText=sec+" sec"

},1000)

}

function saveTimer(){

if(!running) return

clearInterval(timerInterval)

running=false

let sec=Math.floor((Date.now()-startTime)/1000)

let m=Math.floor(sec/60)
let h=Math.floor(m/60)

m=m%60

let times=JSON.parse(localStorage.getItem("times"))||[]

times.push({hours:h,minutes:m})

localStorage.setItem("times",JSON.stringify(times))

document.getElementById("time").innerText="0 sec"

}

/* ADD TIME */

function showManual(){
document.getElementById("manualBox").style.display="block"
}

function closeManual(){
document.getElementById("manualBox").style.display="none"
}

function saveManual(){

let h=Number(document.getElementById("hours").value)||0
let m=Number(document.getElementById("minutes").value)||0

let times=JSON.parse(localStorage.getItem("times"))||[]

times.push({hours:h,minutes:m})

localStorage.setItem("times",JSON.stringify(times))

closeManual()

}

/* VIEW TIMES */

function openTimes(){

let times=JSON.parse(localStorage.getItem("times"))||[]

let list=document.getElementById("timesList")

list.innerHTML=""

times.forEach(function(t){

let div=document.createElement("div")

div.innerText=t.hours+"h "+t.minutes+"m"

list.appendChild(div)

})

document.getElementById("timesBox").style.display="block"

}

function closeTimes(){
document.getElementById("timesBox").style.display="none"
}

/* SETTINGS */

function openSettings(){
document.getElementById("settingsBox").style.display="block"
}

function closeSettings(){
document.getElementById("settingsBox").style.display="none"
}

function setDark(){
document.body.classList.add("dark")
}

function setLight(){
document.body.classList.remove("dark")
}

</script>

</body>
</html>
