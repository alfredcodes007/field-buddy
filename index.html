<!DOCTYPE html>
<html>
<head>
<title>field buddy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{background:#f4f4f4;transition:0.3s;}
body.dark{background:#1e1e1e;color:white;}

.timer{font-size:48px;font-weight:bold;}

.menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:white;
padding:20px;
transition:0.3s;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
z-index:10;
}

body.dark .menu{background:#2b2b2b;}

.menuBtn{
position:fixed;
top:10px;
left:10px;
font-size:26px;
background:none;
border:none;
}

.timesWindow{
display:none;
position:fixed;
top:8%;
left:50%;
transform:translateX(-50%);
width:360px;
max-height:450px;
overflow:auto;
background:white;
padding:20px;
border-radius:10px;
z-index:20;
}

body.dark .timesWindow{background:#2b2b2b;}

.timeItem{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.houseCard{
border:1px solid #ddd;
border-radius:8px;
padding:10px;
margin-bottom:10px;
}

#map{
height:200px;
width:100%;
border-radius:8px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="menu" class="menu">

<h4>field buddy</h4>

<button class="btn btn-outline-secondary w-100 mb-3" onclick="toggleMenu()">Close Menu</button>

<button class="btn btn-info w-100 mb-2" onclick="openHouse()">Add Householder</button>

<button class="btn btn-warning w-100 mb-2" onclick="openHouseList()">View Householders</button>

<button class="btn btn-primary w-100 mb-2" onclick="showManual()">Add Time</button>

<button class="btn btn-secondary w-100 mb-2" onclick="openTimes()">View Times</button>

<button class="btn btn-dark w-100" onclick="openSettings()">Settings</button>

</div>

<button class="menuBtn" onclick="toggleMenu()">☰</button>

<div class="container text-center mt-5">

<h1 class="mb-4">field buddy</h1>

<div id="time" class="timer mb-4">0 hour</div>

<button class="btn btn-success me-2" onclick="startTimer()">Start</button>
<button class="btn btn-primary" onclick="saveTimer()">Save</button>

</div>

<!-- ADD TIME -->
<div id="manualBox" class="timesWindow">

<h4>Add Time</h4>

<input id="manualTime" class="form-control mb-2" placeholder="Enter hour">

<button class="btn btn-success w-100 mb-2" onclick="saveManualTime()">Save</button>

<button class="btn btn-secondary w-100" onclick="closeManual()">Close</button>

</div>

<!-- VIEW TIMES -->
<div id="timesBox" class="timesWindow">

<h4>Saved Times</h4>

<div id="timesList"></div>

<button class="btn btn-secondary w-100 mt-3" onclick="closeTimes()">Close</button>

</div>

<!-- SETTINGS -->
<div id="settingsBox" class="timesWindow">

<h4>Settings</h4>

<button class="btn btn-light w-100 mb-2" onclick="setTheme('light')">Light Theme</button>

<button class="btn btn-dark w-100 mb-2" onclick="setTheme('dark')">Dark Theme</button>

<button class="btn btn-secondary w-100" onclick="closeSettings()">Close</button>

</div>

<script>

let hour=0
let timer=null

function startTimer(){

if(timer) return

timer=setInterval(()=>{
hour++
time.innerText=hour+" sec"
},1000)

}

function saveTimer(){

let times=JSON.parse(localStorage.getItem("times"))||[]

times.push(hour)

localStorage.setItem("times",JSON.stringify(times))

alert("Time Saved!")

hour=0
time.innerText="0 sec"

clearInterval(timer)
timer=null

}

function showManual(){
manualBox.style.display="block"
}

function closeManual(){
manualBox.style.display="none"
}

function saveManualTime(){

let t=parseInt(manualTime.value)

if(!t){alert("Enter time");return}

let times=JSON.parse(localStorage.getItem("times"))||[]

times.push(t)

localStorage.setItem("times",JSON.stringify(times))

manualTime.value=""

alert("Saved!")

}

function openTimes(){

let times=JSON.parse(localStorage.getItem("times"))||[]

timesList.innerHTML=""

times.forEach((t,i)=>{

let div=document.createElement("div")

div.className="timeItem"

div.innerHTML=
"<span>"+t+" hour</span>"+
"<button class='btn btn-danger btn-sm' onclick='deleteTime("+i+")'>Delete</button>"

timesList.appendChild(div)

})

timesBox.style.display="block"

}

function deleteTime(i){

let times=JSON.parse(localStorage.getItem("times"))||[]

times.splice(i,1)

localStorage.setItem("times",JSON.stringify(times))

openTimes()

}

function closeTimes(){
timesBox.style.display="none"
}

function openSettings(){
settingsBox.style.display="block"
}

function closeSettings(){
settingsBox.style.display="none"
}

function setTheme(mode){

if(mode==="dark"){
document.body.classList.add("dark")
localStorage.setItem("theme","dark")
}else{
document.body.classList.remove("dark")
localStorage.setItem("theme","light")
}

}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark")
}

function toggleMenu(){
let menu=document.getElementById("menu")
menu.style.left = menu.style.left==="0px" ? "-250px" : "0px"
}

</script>

</body>
</html>
