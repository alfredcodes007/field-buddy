<!DOCTYPE html>
<html>
<head>
<title>field buddy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f4f4f4;
  transition:0.3s;
}

body.dark{
  background:#1e1e1e;
  color:white;
}

.timer{
  font-size:48px;
  font-weight:bold;
}

.menu{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:white;
  padding:20px;
  transition:0.3s;
  box-shadow:2px 0 10px rgba(0,0,0,0.2);
  z-index:10;
}

body.dark .menu{
  background:#2b2b2b;
}

.menuBtn{
  position:fixed;
  top:10px;
  left:10px;
  font-size:26px;
  background:none;
  border:none;
}

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  font-size:30px;
}

.timesWindow{
  display:none;
  position:fixed;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  width:350px;
  max-height:400px;
  overflow:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  z-index:20;
}

body.dark .timesWindow{
  background:#2b2b2b;
}

.timeItem{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.welcome{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:100;
}

body.dark .welcome{
  background:#1e1e1e;
}
</style>
</head>

<body>

<!-- SIDE MENU -->
<div id="menu" class="menu">
  <h4>field buddy</h4>
  <button class="btn btn-outline-secondary w-100 mb-3" onclick="toggleMenu()">Close Menu</button>
  <button class="btn btn-primary w-100 mb-2" onclick="showManual()">Add Time</button>
  <button class="btn btn-secondary w-100 mb-2" onclick="openTimes()">View Times</button>
  <button class="btn btn-dark w-100" onclick="openSettings()">Settings</button>
</div>

<button class="menuBtn" onclick="toggleMenu()">☰</button>

<!-- MAIN -->
<div class="container text-center mt-5">
  <h1 class="mb-4">field buddy</h1>
  <div id="time" class="timer mb-4">0 sec</div>
  <button class="btn btn-success me-2" onclick="startTimer()">Start</button>
  <button class="btn btn-primary" onclick="saveTimer()">Save</button>

  <div class="card mt-5 mx-auto" style="max-width:400px">
    <div class="card-body">
      <h5>Monthly Score</h5>
      <select id="monthSelect" class="form-select"></select>
      <br>
      <input id="goalInput" class="form-control" placeholder="Goal hours">
      <br>
      <button class="btn btn-success w-100" onclick="saveGoal()">Save Goal</button>
      <p class="mt-3" id="scoreResult">Score: -</p>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab btn btn-success" onclick="showManual()">+</button>

<!-- ADD TIME -->
<div id="manualBox" class="timesWindow">
  <h4>Add Time</h4>
  <input id="hours" class="form-control mb-2" placeholder="Hours">
  <input id="minutes" class="form-control mb-2" placeholder="Minutes">
  <button class="btn btn-success w-100 mb-2" onclick="saveManual()">Save</button>
  <button class="btn btn-secondary w-100" onclick="closeManual()">Cancel</button>
</div>

<!-- TIMES -->
<div id="timesWindow" class="timesWindow">
  <h4>Saved Times</h4>
  <div id="timesList"></div>
  <button class="btn btn-secondary w-100 mt-3" onclick="closeTimes()">Close</button>
</div>

<!-- SETTINGS -->
<div id="settingsBox" class="timesWindow">
  <h4>Settings</h4>
  <button class="btn btn-light w-100 mb-2" onclick="setLight()">Light Theme</button>
  <button class="btn btn-dark w-100 mb-2" onclick="setDark()">Dark Theme</button>
  <button class="btn btn-secondary w-100" onclick="closeSettings()">Close</button>
</div>

<!-- WELCOME -->
<div id="welcome" class="welcome">
  <h1>field buddy</h1>
  <p>By Alfred Sam</p>
  <button class="btn btn-success" onclick="closeWelcome()">Start</button>
</div>

<script>
/* MONTHS */
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
let monthSelect=document.getElementById("monthSelect");
months.forEach((m,i)=>{
  let opt=document.createElement("option");
  opt.value=i;
  opt.textContent=m;
  monthSelect.appendChild(opt);
});
monthSelect.value=new Date().getMonth();

/* MENU */
function toggleMenu(){
  let menu=document.getElementById("menu");
  menu.style.left = menu.style.left==="0px" ? "-250px" : "0px";
}

/* TIMER */
let startTime;
let timerInterval;
let running=false;
function startTimer(){
  if(running) return;
  running=true;
  startTime=Date.now();
  timerInterval=setInterval(function(){
    let sec=Math.floor((Date.now()-startTime)/1000);
    document.getElementById("time").innerText=sec+" sec";
  },1000);
}
function saveTimer(){
  if(!running) return;
  clearInterval(timerInterval);
  running=false;
  let sec=Math.floor((Date.now()-startTime)/1000);
  let minutes=Math.floor(sec/60);
  let hours=Math.floor(minutes/60);
  minutes=minutes%60;
  let date=new Date().toISOString();
  let times=JSON.parse(localStorage.getItem("times"))||[];
  times.push({hours:hours,minutes:minutes,date:date});
  localStorage.setItem("times",JSON.stringify(times));
  document.getElementById("time").innerText="0 sec";
  calculateScore();
}

/* MANUAL */
function showManual(){ document.getElementById("manualBox").style.display="block"; }
function closeManual(){ document.getElementById("manualBox").style.display="none"; }
function saveManual(){
  let h=Number(hours.value)||0;
  let m=Number(minutes.value)||0;
  let date=new Date().toISOString();
  let times=JSON.parse(localStorage.getItem("times"))||[];
  times.push({hours:h,minutes:m,date:date});
  localStorage.setItem("times",JSON.stringify(times));
  closeManual();
  calculateScore();
}

/* TIMES */
function openTimes(){
  let times=JSON.parse(localStorage.getItem("times"))||[];
  let list=document.getElementById("timesList");
  list.innerHTML="";
  times.forEach((t,index)=>{
    if(!t || !t.date) return;
    let d=new Date(t.date);
    let div=document.createElement("div");
    div.className="timeItem";
    div.innerHTML=
      "<span>"+d.toLocaleDateString()+" — "+t.hours+"h "+t.minutes+"m</span>"+
      "<button class='btn btn-danger btn-sm' onclick='deleteTime("+index+")'>Delete</button>";
    list.appendChild(div);
  });
  document.getElementById("timesWindow").style.display="block";
}
function deleteTime(i){
  let times=JSON.parse(localStorage.getItem("times"))||[];
  times.splice(i,1);
  localStorage.setItem("times",JSON.stringify(times));
  openTimes();
  calculateScore();
}
function closeTimes(){ document.getElementById("timesWindow").style.display="none"; }

/* THEME */
function openSettings(){ settingsBox.style.display="block"; }
function closeSettings(){ settingsBox.style.display="none"; }
function setDark(){ document.body.classList.add("dark"); localStorage.setItem("theme","dark"); }
function setLight(){ document.body.classList.remove("dark"); localStorage.setItem("theme","light"); }
if(localStorage.getItem("theme")==="dark"){ document.body.classList.add("dark"); }

/* SCORE */
function saveGoal(){
  let month=monthSelect.value;
  let goal=Number(goalInput.value)||0;
  localStorage.setItem("goal_"+month,goal);
  calculateScore();
}
function calculateScore(){
  let month=monthSelect.value;
  let goal=Number(localStorage.getItem("goal_"+month))||0;
  let times=JSON.parse(localStorage.getItem("times"))||[];
  let totalMinutes=0;
  times.forEach(t=>{
    if(!t || !t.date) return;
    let d=new Date(t.date);
    if(d.getMonth()==month){
      totalMinutes+=(t.hours*60)+(t.minutes);
    }
  });
  let totalHours=totalMinutes/60;
  let score="BAD ❌";
  if(totalHours>=goal){ score="GOOD ✅"; }
  else if(totalHours>=goal/2){ score="OK ⚠"; }
  scoreResult.innerText =
    "Total: "+totalHours.toFixed(1)+"h / Goal: "+goal+"h → "+score;
}
monthSelect.addEventListener("change",calculateScore);
function closeWelcome(){ welcome.style.display="none"; }
calculateScore();
</script>

</body>
</html>
