<!DOCTYPE html>
<html>
<head>

<title>field buddy</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f4f4;
transition:0.3s;
}

body.dark{
background:#1e1e1e;
color:white;
}

.timer{
font-size:48px;
font-weight:bold;
}

.menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:white;
padding:20px;
transition:0.3s;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
z-index:10;
}

body.dark .menu{
background:#2b2b2b;
}

.menuBtn{
position:fixed;
top:10px;
left:10px;
font-size:26px;
background:none;
border:none;
}

.graphBox{
max-width:500px;
margin:auto;
margin-top:30px;
}

</style>
</head>

<body>

<!-- MENU -->

<div id="menu" class="menu">

<h4>field buddy</h4>

<button class="btn btn-outline-secondary w-100 mb-3" onclick="toggleMenu()">Close Menu</button>

</div>

<button class="menuBtn" onclick="toggleMenu()">☰</button>

<!-- MAIN -->

<div class="container text-center mt-5">

<h1 class="mb-4">field buddy</h1>

<div id="time" class="timer mb-4">0 sec</div>

<button class="btn btn-success me-2" onclick="startTimer()">Start</button>
<button class="btn btn-primary" onclick="saveTimer()">Save</button>

<br><br>

<!-- GRAPH TABS -->

<button class="btn btn-outline-primary me-2" onclick="showDay()">Day</button>
<button class="btn btn-outline-primary me-2" onclick="showWeek()">Week</button>
<button class="btn btn-outline-primary" onclick="showMonth()">Month</button>

<!-- GRAPH -->

<div class="graphBox">

<canvas id="progressChart"></canvas>

</div>

</div>

<script>

/* MENU */

function toggleMenu(){

let menu=document.getElementById("menu")

menu.style.left = menu.style.left==="0px" ? "-250px" : "0px"

}

/* TIMER */

let startTime
let timerInterval
let running=false

function startTimer(){

if(running) return

running=true

startTime=Date.now()

timerInterval=setInterval(function(){

let sec=Math.floor((Date.now()-startTime)/1000)

time.innerText=sec+" sec"

},1000)

}

function saveTimer(){

if(!running) return

clearInterval(timerInterval)

running=false

let sec=Math.floor((Date.now()-startTime)/1000)

let minutes=Math.floor(sec/60)

let hours=Math.floor(minutes/60)

minutes=minutes%60

let date=new Date().toISOString()

let times=JSON.parse(localStorage.getItem("times"))||[]

times.push({hours:hours,minutes:minutes,date:date})

localStorage.setItem("times",JSON.stringify(times))

time.innerText="0 sec"

showMonth()

}

/* CHART */

let chart

function createChart(labels,data){

let ctx=document.getElementById("progressChart")

if(chart) chart.destroy()

chart=new Chart(ctx,{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Hours",
data:data
}]
},

options:{
responsive:true
}

})

}

/* DAY VIEW */

function showDay(){

let times=JSON.parse(localStorage.getItem("times"))||[]

let map={}

times.forEach(t=>{

let d=new Date(t.date)

let day=d.toLocaleDateString()

let h=t.hours+(t.minutes/60)

map[day]=(map[day]||0)+h

})

createChart(Object.keys(map),Object.values(map))

}

/* WEEK VIEW */

function showWeek(){

let times=JSON.parse(localStorage.getItem("times"))||[]

let map={}

times.forEach(t=>{

let d=new Date(t.date)

let week="Week "+Math.ceil(d.getDate()/7)

let h=t.hours+(t.minutes/60)

map[week]=(map[week]||0)+h

})

createChart(Object.keys(map),Object.values(map))

}

/* MONTH VIEW */

function showMonth(){

let times=JSON.parse(localStorage.getItem("times"))||[]

let map={}

times.forEach(t=>{

let d=new Date(t.date)

let month=d.toLocaleString("default",{month:"short"})

let h=t.hours+(t.minutes/60)

map[month]=(map[month]||0)+h

})

createChart(Object.keys(map),Object.values(map))

}

/* LOAD DEFAULT GRAPH */

showMonth()

</script>

</body>
</html>
